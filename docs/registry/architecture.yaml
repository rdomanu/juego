# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets: []

# Example:
#
# performance_budgets:
#   - target_fps: 60
#     total_frame_budget_ms: 16.6
#     platform: PC             # PC | Console | Mobile | All
#     adr: docs/architecture/adr-0000-performance-targets.md
#     added: 2026-03-26
#     revised: ""
#
#   - system: combat
#     status: active
#     budget_ms: 2.0
#     adr: docs/architecture/adr-0003-combat-system.md
#     notes: "Includes physics queries, hitbox evaluation, and damage calculation"
#     referenced_by:
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: bucle_de_simulacion
    status: active
    api: "_physics_process (paso fijo, 60 Hz)"
    not: "_process para la logica de juego"
    adr: docs/architecture/adr-0001-bus-de-eventos.md
    reason: "El paso fijo de _physics_process da delta estable -> determinismo (misma partida = mismo resultado) y es lo que NavigationAgent2D necesita. El dibujo (UI/Feedback/camara) va en _process (tiempo real). Verificado en doc oficial Godot 4.6."
    referenced_by:
      - docs/architecture/adr-0001-bus-de-eventos.md
    added: 2026-07-22
    revised: ""
  - purpose: guardado_partida
    status: active
    api: "JSON + FileAccess en user:// (escribir en temp y renombrar)"
    not: "custom Resources (.tres) / ResourceSaver para el save de partida"
    adr: docs/architecture/adr-0002-guardado-serializacion.md
    reason: "JSON son datos (no ejecuta codigo) -> seguro frente a saves manipulados; legible/depurable; un solo formato. Se serializa tambien el estado del RNGService (determinismo). Los .tres SI valen para el catalogo estatico del desarrollador (ADR-0003), no para el save del jugador."
    referenced_by:
      - docs/architecture/adr-0002-guardado-serializacion.md
    added: 2026-07-22
    revised: ""
  - purpose: formato_catalogo
    status: active
    api: "Custom Resources (.tres) tipados (class_name + @export), cargados con load()/preload()"
    not: "JSON para el catalogo del desarrollador (JSON es solo para el save de partida, ADR-0002)"
    adr: docs/architecture/adr-0003-formato-catalogo.md
    reason: "El catalogo (contenido estatico del desarrollador en res://) se edita en el Inspector, no se parsea, es tipado y es la practica recomendada de Godot 4. Seguridad de .tres NO aplica (no editable por el jugador). Distinto del save (JSON)."
    referenced_by:
      - docs/architecture/adr-0003-formato-catalogo.md
    added: 2026-07-22
    revised: ""
  - purpose: rejilla_construccion
    status: active
    api: "TileMapLayer (una capa por funcion: suelo, paredes/salas); local_to_map/map_to_local/set_cell/get_cell_source_id"
    not: "TileMap (deprecado desde 4.3)"
    adr: docs/architecture/adr-0004-rejilla-navegacion-2d.md
    reason: "TileMap esta deprecado. Los puestos/objetos son PackedScene (nodos con logica) posicionados con map_to_local, NO tiles del mapa."
    referenced_by:
      - docs/architecture/adr-0004-rejilla-navegacion-2d.md
    added: 2026-07-22
    revised: ""
  - purpose: navegacion_npcs
    status: active
    api: "NavigationServer2D (dedicado 4.5) + NavigationRegion2D/NavigationPolygon + NavigationAgent2D (mesh-based) en _physics_process"
    not: "movimiento directo sin pathfinding; TileMap-grid AStarGrid2D queda como plan B de rendimiento (QQ-02)"
    adr: docs/architecture/adr-0004-rejilla-navegacion-2d.md
    reason: "Navegacion por zonas, natural para salas abiertas y escala bien. El avoidance de NavigationAgent2D es EXPERIMENTAL en 4.6 -> desactivado/minimo (el solapamiento visual leve da igual: el movimiento es cosmetico, Flujo FL5). Re-bake de la NavigationPolygon solo al cambiar el layout."
    referenced_by:
      - docs/architecture/adr-0004-rejilla-navegacion-2d.md
    added: 2026-07-22
    revised: ""

