# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: foundation_llama_a_sistemas_por_nombre
    status: active
    description: "La capa Foundation (EventBus, SaveManager, RNG, Tiempo, Datos) nunca debe llamar a sistemas Core/Feature/Presentation por su nombre. El EventBus solo retransmite (signals) o invoca callables que los propios sistemas registran (registrar_ordenado)."
    why: "Acoplar Foundation hacia arriba viola las capas estrictas (principio 4) y anula el desacople que justifica tener un bus. El orden determinista se logra con registro por prioridad, no con llamadas hardcodeadas."
    adr: docs/architecture/adr-0001-bus-de-eventos.md
    added: 2026-07-22
  - pattern: bus_para_todo_signal_spaghetti
    status: active
    description: "No usar el EventBus para toda comunicacion. Es solo para eventos cross-system entre nodos distantes; las relaciones cercanas (un puesto y su agente) usan senal directa nodo->nodo."
    why: "Abusar del bus lo vuelve dificil de depurar (hay que buscar quien escucha cada evento en todo el codigo). Confirmado como caution por la comunidad Godot."
    adr: docs/architecture/adr-0001-bus-de-eventos.md
    added: 2026-07-22
  - pattern: custom_resource_como_save_de_partida
    status: active
    description: "El save de partida (estado mutable del jugador) nunca debe guardarse como custom Resource (.tres/.res/.tscn) ni cargarse con load()/ResourceLoader. Usar JSON+FileAccess en user:// (ADR-0002)."
    why: "Cargar un Resource ejecuta su _init -> un save manipulado puede ejecutar codigo arbitrario (borrar archivos del usuario). Verificado 2026-07-22. Ademas, issue de ResourceSaver en 4.6 con subrecursos anidados. Los .tres SI valen para el catalogo estatico del desarrollador (ADR-0003)."
    adr: docs/architecture/adr-0002-guardado-serializacion.md
    added: 2026-07-22
  - pattern: mutar_o_anidar_definiciones_del_catalogo
    status: active
    description: "Un sistema NUNCA muta lo que devuelve Datos.obtener (la definicion es una plantilla read-only compartida): las instancias de partida son objetos aparte. Y las definiciones se referencian entre si por id (StringName), NO anidando Resources unos dentro de otros."
    why: "Mutar una plantilla compartida corrompe a todos los que la leen (Datos R1). Anidar Resources dispara el problema de duplicate_deep (4.5) y rompe la validacion de integridad referencial (Datos R3). Referenciar por id permite validar y tolerar catalogos que evolucionan."
    adr: docs/architecture/adr-0003-formato-catalogo.md
    added: 2026-07-22
  - pattern: logica_depende_de_posicion_del_sprite
    status: active
    description: "La logica de balance (colas, seleccion de persona, tiempo de espera, abandono) NUNCA lee la posicion/movimiento del sprite de un NPC para decidir. El movimiento (navegacion 2D) es una capa COSMETICA; el tiempo de desplazamiento se contabiliza en la logica (Flujo FL5), no se mide del sprite."
    why: "El movimiento usa NavigationAgent2D con avoidance experimental (posiblemente no determinista). Si la logica dependiera de la posicion del sprite, se romperia el determinismo del juego ('misma partida = mismo resultado'). Separar logica de presentacion protege el determinismo y permite degradar el movimiento sin afectar las reglas."
    adr: docs/architecture/adr-0004-rejilla-navegacion-2d.md
    added: 2026-07-22
  - pattern: gotchas_navegacion_2d
    status: active
    description: "(1) NO fijar NavigationAgent2D.target_position en _ready(): el NavigationServer se sincroniza en el 1er physics frame -> fijarlo tras 'await get_tree().physics_frame' o el primer path sale vacio. (2) NO re-bake la NavigationPolygon por frame: solo al cambiar el layout (construir/demoler)."
    why: "Son gotchas verificados de Godot 4.x. Ignorarlos causa NPCs que no se mueven (path vacio) o caidas de rendimiento (re-bake constante)."
    adr: docs/architecture/adr-0004-rejilla-navegacion-2d.md
    added: 2026-07-22

