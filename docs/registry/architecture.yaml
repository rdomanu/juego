# Architecture Decision Registry
#
# PURPOSE: Single source of truth for key architectural stances that all ADRs
# must agree on. Skills check this before writing new ADRs to detect conflicts
# at authoring time — before stories are created against contradictory decisions.
#
# RULES:
#   - Register a stance when it constrains how OTHER systems must be built.
#     An internal implementation detail that affects only one ADR does not need
#     to be registered.
#   - Never delete entries — set status: superseded_by: ADR-NNNN instead.
#   - When a stance changes: update the entry, set revised: to today's date,
#     add a comment with the old value, and run /architecture-review to check
#     what ADRs are now invalidated.
#   - adr: is the authoritative source. All other ADRs that depend on this
#     stance list themselves in referenced_by.
#
# WRITTEN BY: /architecture-decision (Phase 5 — after ADR is approved)
# READ BY:    /architecture-decision (Step 2 — before authoring begins)
#             /architecture-review (Phase 4 — cross-ADR conflict baseline)
#             /create-stories (to embed architectural constraints in stories)
#             /dev-story (to check implementation against accepted stances)
#
# SEARCH PATTERNS (for skills using Grep):
#   All state owners:       Grep pattern="^  - state:" path="docs/registry/architecture.yaml"
#   Who owns player_health: Grep pattern="state: player_health"
#   All signal contracts:   Grep pattern="pattern: signal"
#   Budget for combat:      Grep pattern="system: combat"
#   All forbidden patterns: Grep pattern="^  - pattern:" (forbidden_patterns section)
#   Superseded entries:     Grep pattern="status: superseded"

version: 1
last_updated: "2026-07-22"

# ─── STATE OWNERSHIP ─────────────────────────────────────────────────────────
# Who is the authoritative owner of each piece of shared game state.
# Conflicts: two ADRs claiming to own the same state = data race / authority bug.
#
# Register state when it is READ or WRITTEN by more than one system.
# Internal-only state (never accessed by another system) does not need to be registered.
#
# Required fields: state, owner_system, adr, interface, referenced_by[], added
# interface: how other systems access this state (read-only property, method call,
#   signal, shared resource, etc.) — this is the contract other ADRs depend on.

state_ownership: []

# Example:
#
# state_ownership:
#   - state: player_health
#     status: active           # active | superseded_by: ADR-NNNN
#     owner_system: health-system
#     adr: docs/architecture/adr-0001-health-system.md
#     interface: "HealthComponent.current_health (read-only float, range 0–max_health)"
#     write_access: health-system-only   # only owner can write; others read
#     referenced_by:
#       - docs/architecture/adr-0001-health-system.md
#       - docs/architecture/adr-0003-combat-system.md   # reads to apply damage
#       - docs/architecture/adr-0007-ui-system.md       # reads to display HUD
#     added: 2026-03-26
#     revised: ""


# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: comunicacion_cross_system
    status: active
    pattern: event_bus
    producer: cualquier-sistema
    consumers:
      - cualquier-sistema-distante
    adr: docs/architecture/adr-0001-bus-de-eventos.md
    signal_signature: "EventBus signals: tramite_completado(tramite_id: StringName, agente), abandono(persona), cambio_de_turno(turno: int), cambio_dia_noche(es_de_noche: bool), persona_generada(persona), saldo_cambiado(nuevo_saldo: int), reclamacion_generada(origen: StringName), nuevo_dia, nuevo_mes"
    notes: "Comunicacion entre sistemas distantes via autoload EventBus (signal.emit / .connect(Callable)). Las relaciones cercanas (puesto<->agente) usan senal directa, NO el bus."
    referenced_by:
      - docs/architecture/adr-0001-bus-de-eventos.md
    added: 2026-07-22
    revised: ""
  - contract: eventos_ordenados
    status: active
    pattern: event_bus
    producer: time-system
    consumers:
      - patience-satisfaction   # nuevo_dia prioridad 10
      - economy-budget          # nuevo_dia prioridad 20 / nuevo_mes prioridad 10
      - staff-agents            # nuevo_dia prioridad 30
      - demand-generation       # nuevo_dia prioridad 40 / nuevo_mes prioridad 30
    adr: docs/architecture/adr-0001-bus-de-eventos.md
    signal_signature: "EventBus.registrar_ordenado(evento: StringName, prioridad: int, cb: Callable); EventBus.disparar_ordenado(evento: StringName)"
    notes: "nuevo_dia: Paciencia(10)->Economia(20)->Personal(30)->Demanda(40). nuevo_mes: Economia(10)->Paciencia(20)->Demanda(30). El bus invoca por prioridad ascendente; NO conoce los sistemas."
    referenced_by:
      - docs/architecture/adr-0001-bus-de-eventos.md
    added: 2026-07-22
    revised: ""
  - contract: persistencia_por_sistema
    status: active
    pattern: direct_call
    producer: save-manager
    consumers:
      - cualquier-sistema-con-estado-mutable
    adr: docs/architecture/adr-0002-guardado-serializacion.md
    signal_signature: "Cada sistema persistente implementa save() -> Dictionary y load_state(d: Dictionary), y se marca con el grupo de nodos 'Persist'. SaveManager.guardar()/cargar() recorre get_nodes_in_group('Persist')."
    notes: "El SaveManager (Foundation) NO llama a los sistemas por nombre: itera el grupo generico 'Persist' (respeta forbidden_patterns.foundation_llama_a_sistemas_por_nombre). Vector2i -> {x,y}. Cargar arranca en Pausa, sin eventos retroactivos."
    referenced_by:
      - docs/architecture/adr-0002-guardado-serializacion.md
    added: 2026-07-22
    revised: ""
  - contract: acceso_catalogo
    status: active
    pattern: direct_call
    producer: data-config
    consumers:
      - cualquier-sistema-que-lea-definiciones
    adr: docs/architecture/adr-0003-formato-catalogo.md
    signal_signature: "Datos.obtener(tipo: StringName, id: StringName) -> Resource (read-only); Datos.obtener_todos(tipo) -> Array; Datos.validar() -> Array[String]"
    notes: "Las definiciones del catalogo se resuelven por id y son READ-ONLY (plantillas compartidas). Las definiciones se referencian entre si por id (StringName), NO por Resource anidado. Las instancias de partida son objetos aparte (Datos R1)."
    referenced_by:
      - docs/architecture/adr-0003-formato-catalogo.md
    added: 2026-07-22
    revised: ""

