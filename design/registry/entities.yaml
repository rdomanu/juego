# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: retorno_dgp
    status: active
    source: design/gdd/economy-budget.md
    referenced_by:
      - design/gdd/economy-budget.md
      - design/gdd/data-config.md
      - design/gdd/patience-satisfaction.md
    variables:
      - sat
      - retorno_dgp_min
      - retorno_dgp_max
    output_range: [0.15, 0.45]
    expression: "retorno_dgp_min + (retorno_dgp_max - retorno_dgp_min) * (clamp(sat,0,100)/100)"
    notes: "Formula propiedad de Economia; Datos posee los params (min/max) y la referencia en su F8. sat (0-100) lo posee Paciencia #10 (F3): es sat_cierre_doc = la MEDIA CERRADA de satisfaccion de Documentacion de la JORNADA ANTERIOR (fija todo el dia; estable intra-jornada). 1a jornada sin datos = sat_inicial 50 -> retorno 0.30. ingreso_comisaria = tarifa_eur x retorno_dgp(sat)."
    added: 2026-07-19
    revised: ""
  - name: duracion_efectiva
    status: active
    source: design/gdd/flow-queues.md
    referenced_by:
      - design/gdd/flow-queues.md
      - design/gdd/staff-agents.md
    variables:
      - duracion_min
      - modificador_produccion
    output_range: [1, 1440]
    expression: "duracion_min * modificador_produccion(agente)"
    notes: "Flujo F1. duracion_min (Datos) x modificador_produccion. modificador_produccion lo computa PERSONAL desde la Rapidez del agente (staff-agents.md F2), rango [0.5, 1.3] (>1.0 = agente lento, <1.0 = rapido, default 1.0); Formacion #29 lo baja mas. Antes (0,1] cuando solo Formacion lo bajaba (revisado 2026-07-21 al disenar Personal). Clamp minimo 1 min. La rama atencion/satisfaccion (Trato) NO entra aqui: viaja en 'tramite completado' -> Paciencia #10."
    added: 2026-07-19
    revised: 2026-07-21
  - name: throughput_puesto
    status: active
    source: design/gdd/flow-queues.md
    referenced_by:
      - design/gdd/flow-queues.md
      - design/gdd/data-config.md
      - design/gdd/demand-generation.md
    variables:
      - minutos_operativos_puesto
      - duracion_efectiva_media
    output_range: [0, 1440]
    expression: "minutos_operativos_puesto / duracion_efectiva_media"
    notes: "Flujo F2/F3 (tramites/dia). capacidad_servicio = suma de throughput_puesto; capacidad_max_servicio = num_puestos_max x throughput_puesto. Lado CAPACIDAD del invariante R5 (Datos posee R5; Demanda calibra la demanda contra esto). Refina el sanity check de Datos F8. minutos_operativos lo posee Documentacion/Horarios+Tiempo (provisional). Ej.: Doc 390/15=26 (ventana base 08:00-14:30); ODAC 960/30~=32 (media ponderada de la mezcla de 13 denuncias, Demanda F3 = 29,75; antes ~28 con 8 tipos)."
    added: 2026-07-19
    revised: ""
  - name: demanda_dia_servicio
    status: active
    source: design/gdd/demand-generation.md
    referenced_by:
      - design/gdd/demand-generation.md
      - design/gdd/data-config.md
    variables:
      - poblacion
      - tasa_base_servicio
    output_range: [0, 180]
    expression: "poblacion * (tasa_base_servicio / 1000)"
    notes: "Demanda F1. Volumen diario de llegadas por servicio. Lado DEMANDA del invariante R5 (Datos posee R5; se calibra <= capacidad_max_servicio de Flujo). Semillas MVP Pozuelo: Doc tasa 0.5 -> 45/dia; ODAC tasa 0.4 -> 36/dia (dentro del 30-60/dia de Datos F8). tasa_base escala con el nivel (DG8)."
    added: 2026-07-19
    revised: ""
  - name: salario_dia_efectivo
    status: active
    source: design/gdd/staff-agents.md
    referenced_by:
      - design/gdd/staff-agents.md
      - design/gdd/economy-budget.md
      - design/gdd/data-config.md
    variables:
      - salario_base
      - media_atributos
      - k_calidad
      - prima_rango
    output_range: [30, 200]
    expression: "salario_base(tipo) * (1 + k_calidad * (media_atributos - 3)/2) * prima_rango"
    notes: "Personal F1. Salario diario real del agente = salario_base del tipo (Datos: ag_doc 60, ag_odac 70) x prima por atributos (mejor = mas caro) x prima_rango (Policia 1.0, Oficial ~1.3). Lo cobra Economia (E3/F3). Nadie perfecto = raro y caro. NOTA: formar sube atributos -> sube este salario (Formacion #29)."
    added: 2026-07-21
    revised: ""
  - name: coste_sala
    status: active
    source: design/gdd/construction-layout.md
    referenced_by:
      - design/gdd/construction-layout.md
      - design/gdd/economy-budget.md
      - design/gdd/data-config.md
    variables:
      - coste_base_sala
      - coste_por_celda
      - area_celdas
    output_range: [0, 5000]
    expression: "coste_base_sala + coste_por_celda * area_celdas"
    notes: "Construccion #7 F1. Coste de una sala de tamano libre = base (Datos coste_construccion_sala_espera 200) + coste_por_celda x area_celdas. Sobredimensionar cuesta (no hay tope rigido). Oficinas (areas logicas) pueden tener base 0. Lo cobra Economia (E4). Ej.: 3x3 -> 380; 5x4 -> 600."
    added: 2026-07-21
    revised: ""

